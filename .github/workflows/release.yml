name: Build and Release Tauri App

on:
  push:
    branches:
      - main

jobs:
  build:
    permissions:
      contents: write # Crucial: Allows the action to create a GitHub Release

    strategy:
      fail-fast: false
      matrix:
        include:
          # --- Windows ---
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
          - platform: windows-latest
            target: aarch64-pc-windows-msvc # Windows ARM64

          # --- Linux ---
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          # Uses GitHub's native ARM runner to avoid complex C-dependency cross-compilation
          - platform: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu # Linux ARM64

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux Dependencies (Ubuntu Only)
        if: contains(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build and Release App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: 'v__VERSION__'
          releaseBody: 'Automated build generated via GitHub Actions.'
          releaseDraft: true 
          prerelease: false
          args: '--target ${{ matrix.target }}'