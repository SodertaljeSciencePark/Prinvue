name: Build and Release Tauri App

on:
  push:
    branches:
      - main

jobs:
  build:
    permissions:
      contents: write # Crucial: Allows the action to create a GitHub Release

    strategy:
      fail-fast: false
      matrix:
        # Runs three separate machines in parallel
        platform: [windows-latest, ubuntu-22.04, macos-latest]

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux Dependencies (Ubuntu Only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Update if your React frontend needs a different version

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm install

      - name: Build and Release App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # This magic string reads the version directly from your tauri.conf.json
          tagName: v__VERSION__
          releaseName: 'v__VERSION__'
          releaseBody: 'Automated build generated via GitHub Actions.'
          
          # Setting to true creates a "Draft" release. 
          # It gathers the Windows, Mac, and Linux files into one release before you hit "Publish".
          releaseDraft: true 
          prerelease: false
